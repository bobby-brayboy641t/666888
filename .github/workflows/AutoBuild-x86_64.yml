###########################################################
#   Description: Compile OpenWrt by GitHub Actions        #
#   Based on: https://github.com/P3TERX/Actions-OpenWrt   #
#   Author: Hyy2001X                                      #
###########################################################

name: x86_64

on:
  repository_dispatch:
  ## Git Push 时触发编译(不要删除此行注释)
  #push:
  #  branches: 
  #    - master
  
  ## 定时触发编译(不要删除此行注释)
  schedule:
   - cron: 0 8 * * 5
  
  ## 重新点亮 Star 时触发编译(不要删除此行注释)
  #watch:
  #  types: [started]
  
  ### 界面控制部分 ( 以下内容请保持不变, 如有需要仅修改 options 选项 )
  workflow_dispatch:
    inputs:
      Tempoary_CONFIG:
        description: '配置文件'
        default: 'x86_64'
        type: choice
        options:
          - 'x86_64'
      Code_SOURCE: 
        description: '源码仓'
        default: 'immortalwrt/immortalwrt:openwrt-24.10'
        type: choice
        options:
          - 'immortalwrt/immortalwrt:master'
          - 'immortalwrt/immortalwrt:openwrt-24.10'
          - 'coolsnowwolf/lede:master'
      Tempoary_FLAG:
        description: '固件标签'
        default: 'AUTO'
        type: choice
        options:
          - 'AUTO'
          - 'Full'
      Tempoary_IP:
        description: '固件 IP 地址 [可选]'
        default: '192.168.9.253'
      UPLOAD_RELEASES:
        description: '上传固件到 Releases'
        default: 'true'
        type: boolean
      UPLOAD_ARTIFACTS:
        description: '上传固件到 Artifacts'
        default: 'false'
        type: boolean
      UPLOAD_BIN_ARTIFACTS:
        description: '上传 bin 文件夹到 Artifacts'
        default: 'false'
        type: boolean
      SSH:
        description: 'SSH连接Actions'
        default: 'false'
        type: boolean
      ### 界面控制部分结束 ( 以上内容请保持不变 )

### 请按需求修改以下内容
### 环境变量设置
env:
# 编译时调用的 [.config] 文件名称
  CONFIG_FILE: x86_64
# 源码仓库:分支
  DEFAULT_SOURCE: ${{ github.event.inputs.Code_SOURCE }}
# 删除无用文件以增加编译空间
  DELETE_USELESS_FILES: true
# 删除早期的 workflow 任务
  DELETE_OLD_WORKFLOW: true
# Cache缓存加速编译
  CACHE_ACCELERATE: true
### 结束
### 请按需求修改以上内容

jobs:
  Compile:
    runs-on: ubuntu-22.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}

    steps:

    - name: 检查服务器性能
      run: |
        echo "警告⚠"
        echo "分配的服务器性能有限，若选择的插件过多，务必注意CPU性能！"
        echo -e "已知CPU型号（降序）：7763，8370C，8272CL，8171M，E5-2673 \n"
        echo "--------------------------CPU信息--------------------------"
        echo "CPU物理数量：$(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo -e "CPU核心信息：$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------内存信息--------------------------"
        echo "已安装内存详细信息："
        echo -e "$(sudo lshw -short -C memory | grep GiB) \n"
        echo "--------------------------硬盘信息--------------------------"
        echo "硬盘数量：$(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT
        cpu_nproc=$(nproc)
        if [[ "$cpu_nproc" =~ "4" ]]; then
          echo "CPU为4核，继续执行命令"
        else
          echo "CPU不为4核，性能不足，停止执行命令"
          exit 1
        fi

    - name: 初始化系统环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        docker image prune -f
        sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/apt/sources.list.d /usr/local/lib/android
        sudo -E apt-mark hold grub-efi-amd64-signed
        sudo -E apt update
        sudo -E apt -y purge azure-cli* docker* ghc* zulu* llvm* firefox google* dotnet* powershell* openjdk* mysql* php* mongodb* dotnet* snap*
        sudo -E apt -y full-upgrade
        sudo -E apt -y install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo tree uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev flex python-is-python3
        sudo -E systemctl daemon-reload
        sudo -E apt -y autoremove --purge
        sudo -E apt clean

    - name: 使用actions/checkout来检出代码
      uses: actions/checkout@main

    - name: 更新时区、编译时间
      id: date
      run: |
          sudo timedatectl set-timezone "Asia/Shanghai"
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
          echo "FILE_TIME=$(date +"%m-%d %H.%M")" >> $GITHUB_ENV
          echo "FILE_TIME1=$(date "+%Y年%m月%d日-%H点%M分")" >> $GITHUB_ENV
          echo "FILE_TIME2=$(date "+%Y%m%d-%H%M")" >> $GITHUB_ENV
          COMPILE_TIME=$(date +"%Y-%m-%d %H:%M:%S")
          echo "COMPILE_TIME=$COMPILE_TIME" >> $GITHUB_ENV
          echo "✅ 开始编译时间：$COMPILE_TIME"
          START_TIME=`date +'%Y-%m-%d %H:%M:%S'`
          echo "START_SECONDS=$(date --date="$START_TIME" +%s)" >> $GITHUB_ENV
          COMPILE_START=$(date +%s)
          echo "COMPILE_START=$COMPILE_START" >> $GITHUB_ENV

    - name: Ubuntu可用磁盘空间
      if: env.DELETE_USELESS_FILES == 'true' && !cancelled()
      uses: jlumbroso/free-disk-space@main
      with:
        # this might remove tools that are actually needed,
        # if set to "true" but frees about 6 GB
        tool-cache: true
        # all of these default to true, but feel free to set to
        # "false" if necessary for your workflow
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        swap-storage: true

    - name: 加载自定义变量
      run: |
        if [ -n "${{ github.event.inputs.Tempoary_CONFIG }}" ]
        then
            if [ -f "$GITHUB_WORKSPACE/Configs/${{ github.event.inputs.Tempoary_CONFIG }}" ]
            then
                CONFIG_FILE=${{ github.event.inputs.Tempoary_CONFIG }}
            else
                CONFIG_FILE=${{ env.CONFIG_FILE }}
            fi
        else
            CONFIG_FILE=${{ env.CONFIG_FILE }}
        fi
        if [ ! -f "$GITHUB_WORKSPACE/Configs/$CONFIG_FILE" ]
        then
            echo "CONFIG_FILE: [/Config/$CONFIG_FILE] is not detected ..."
            exit 1
        else
            echo "CONFIG_FILE: [/Config/$CONFIG_FILE]"
            echo "CONFIG_FILE=$CONFIG_FILE" >> $GITHUB_ENV
        fi
        if [ -n "${{ github.event.inputs.Tempoary_IP }}" ]
        then
            echo "IP: [${{ github.event.inputs.Tempoary_IP }}]"
            echo "Tempoary_IP=${{ github.event.inputs.Tempoary_IP }}" >> $GITHUB_ENV
        fi
        if [ -n "${{ github.event.inputs.Tempoary_FLAG }}" ]
        then
            echo "FLAG: [${{ github.event.inputs.Tempoary_FLAG }}]"
            echo "Tempoary_FLAG=${{ github.event.inputs.Tempoary_FLAG }}" >> $GITHUB_ENV
        fi
        REPO_URL="https://github.com/$(cut -d \: -f 1 <<< ${{ env.DEFAULT_SOURCE }})"
        REPO_BRANCH=$(cut -d \: -f 2 <<< ${{ env.DEFAULT_SOURCE }})
        echo "REPO_URL=$REPO_URL" >> $GITHUB_ENV
        echo "REPO_BRANCH=$REPO_BRANCH" >> $GITHUB_ENV
        echo "Compile_Date=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
        echo "Display_Date=$(date +%Y/%m/%d)" >> $GITHUB_ENV
        if [[ -z "${{ github.event.inputs.Tempoary_CONFIG }}" ]]; then
            echo "TIMED_TRIGGER=true" >> $GITHUB_ENV
        else
            echo "UPLOAD_RELEASES=${{ github.event.inputs.UPLOAD_RELEASES }}" >> $GITHUB_ENV
            echo "UPLOAD_ARTIFACTS=${{ github.event.inputs.UPLOAD_ARTIFACTS }}" >> $GITHUB_ENV
            echo "UPLOAD_BIN_ARTIFACTS=${{ github.event.inputs.UPLOAD_BIN_ARTIFACTS }}" >> $GITHUB_ENV
        fi

    - name: 克隆Openwrt源代码
      run: |
        git clone -b $REPO_BRANCH $REPO_URL openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        VERSION_INFO=$(git show -s --date=short --format="作者: %an<br/>时间: %cd<br/>内容: %s<br/>hash: %H")
        echo "VERSION_INFO=$VERSION_INFO" >> $GITHUB_ENV

    - name: 运行DIY自定义脚本
      run: |
        echo "Free space:"
        df -h
        chmod +x Scripts/AutoBuild_*.sh
        [ -e files ] && mv files openwrt/files
        cd openwrt
        if [ "${{ env.CACHE_ACCELERATE }}" == true ]
        then
            echo -e "\nCONFIG_DEVEL=y\nCONFIG_CCACHE=y\n" >> $GITHUB_WORKSPACE/Configs/$CONFIG_FILE
        fi
        cp $GITHUB_WORKSPACE/Configs/$CONFIG_FILE .config
        source $GITHUB_WORKSPACE/Scripts/AutoBuild_DiyScript.sh
        source $GITHUB_WORKSPACE/Scripts/AutoBuild_Function.sh
        make defconfig
        Firmware_Diy_Start
        rm -f .config && cp $GITHUB_WORKSPACE/Configs/$CONFIG_FILE .config
        source $GITHUB_WORKSPACE/Scripts/AutoBuild_Diy.sh
        Firmware_Diy_Main
        Firmware_Diy
        Firmware_Diy_Other

        DEVICE=$(grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/')
        ARCH=$(grep '^CONFIG_TARGET_ARCH_PACKAGES=' .config | sed -r 's/.*="(.*)"/\1/')
        FULL_DEVICE_NAME="${DEVICE} ${ARCH}"
        [ -n "$DEVICE" ] && echo "DEVICE_NAME=_$DEVICE" >> $GITHUB_ENV
        echo "FULL_DEVICE_NAME=$FULL_DEVICE_NAME" >> $GITHUB_ENV
        echo "✅ 提取到的（设备型号+架构）：$FULL_DEVICE_NAME"

        MANAGE_IP=""
        CONFIG_GENERATE="package/base-files/files/bin/config_generate"
        if [ -f "$CONFIG_GENERATE" ]; then
          MANAGE_IP=$(grep -oP '192\.168\.\d+\.\d+' "$CONFIG_GENERATE" | head -1)
        fi
        if [ -z "$MANAGE_IP" ] && [ -f "files/etc/config/network" ]; then
          MANAGE_IP=$(grep -A 10 'config interface 'lan'' "files/etc/config/network" | grep 'option ipaddr' | sed -r 's/.*ipaddr[[:space:]]*"(.*)"/\1/' | head -1)
        fi
        MANAGE_IP=${MANAGE_IP:-"192.168.1.1"}
        echo "MANAGE_IP=$MANAGE_IP" >> $GITHUB_ENV
        echo "✅ 提取到的管理IP：$MANAGE_IP"

        SOURCE_REPO="$(echo $REPO_URL | awk -F '/' '{print $(NF)}')"
        echo "SOURCE_REPO=$SOURCE_REPO" >> $GITHUB_ENV
        DEVICE_TARGET=$(cat .config | grep CONFIG_TARGET_BOARD | awk -F '"' '{print $2}')
        echo "DEVICE_TARGET=$DEVICE_TARGET" >> $GITHUB_ENV
        DEVICE_SUBTARGET=$(cat .config | grep CONFIG_TARGET_SUBTARGET | awk -F '"' '{print $2}')
        echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET" >> $GITHUB_ENV
        echo "✅ 提取到的内容：$DEVICE_SUBTARGET
        echo "✅ 提取到的内容：$DEVICE_TARGET

    - name: SSH连接
      uses: P3TERX/ssh2actions@v1.0.0
      if: github.event.inputs.SSH == 'true'
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}     

    - name: 生成config
      run: |
        cd openwrt && make defconfig && ./scripts/diffconfig.sh > AAA.txt
        cat AAA.txt

    - name: 配置文件AAA上传Github Artifacts
      uses: actions/upload-artifact@main
      with:
        name: config
        path: openwrt/AAA.txt

    - name: 缓存加速
      if: env.CACHE_ACCELERATE == 'true'
      uses: HiGarfield/cachewrtbuild@main
      with:
        ccache: 'true'
        toolchain: 'true'
        mixkey: cache-${{ env.REPO_BRANCH }}-${{ env.FULL_DEVICE_NAME }}
        prefix: ${{ github.workspace }}/openwrt

    - name: 预先下载DL库
      run: |
        cd openwrt
        ./scripts/feeds install -a
        make defconfig
        make download -j8

    - name: 开始构建OpenWrt固件
      id: compile
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 || V=s
        [ "$?" == 0 ] && echo "Compile_Result=true" >> $GITHUB_ENV || echo "Compile_Result=false" >> $GITHUB_ENV

    - name: 计算编译时长
      id: calc_duration
      run: |
          COMPILE_END=$(date +%s)
          DURATION_SEC=$((COMPILE_END - COMPILE_START))
          HOURS=$((DURATION_SEC / 3600))
          MINUTES=$(((DURATION_SEC % 3600) / 60))
          SECONDS=$((DURATION_SEC % 60))
          COMPILE_DURATION=$(printf "%02d:%02d:%02d" $HOURS $MINUTES $SECONDS)
          echo "COMPILE_DURATION=$COMPILE_DURATION" >> $GITHUB_ENV
          echo "✅ 编译总耗时：$COMPILE_DURATION（H:M:S）"

    - name: 空间使用
      continue-on-error: true
      run: du -h ./ --max-depth=1 && tree -a -L 2

    - name: 整理固件信息
      if: steps.compile.outcome == 'success' && !cancelled()
      run: |
        cd openwrt
        source $GITHUB_WORKSPACE/Scripts/AutoBuild_Function.sh
        Firmware_Diy_End
        cd bin/targets/x86/64/
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        cat openwrt-*.manifest



    - name: 将固件上传至Release
      uses: svenstaro/upload-release-action@v2
      if: env.UPLOAD_RELEASES == 'true' && steps.compile.outcome == 'success' && !cancelled()
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: openwrt/bin/Firmware/*
        file_glob: true
        tag: AutoUpdate
        overwrite: true

    - name: Refresh API (1/2)
      if: env.UPLOAD_RELEASES == 'true' && steps.compile.outcome == 'success' && !cancelled()
      run: |
        wget https://api.github.com/repos/${{github.repository}}/releases/tags/AutoUpdate -O API
        echo "## Luci app" >> release.txt
        grep ^luci-app- ${{ env.FIRMWARE }}/openwrt-*.manifest | awk 'BEGIN { print "**Name**|**Version**\n-|-" } { split($0, arr, " - "); print arr[1] "|" arr[2] }' >> release.txt





    - name: Refresh API (2/2)
      if: env.UPLOAD_RELEASES == 'true' && steps.compile.outcome == 'success' && !cancelled()
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ./API
        file_glob: true
        tag: AutoUpdate
        overwrite: true
        body: |
          ### 📒 固件信息
          - 💻 这是 ${{ env.FULL_DEVICE_NAME }} 平台使用的 OpenWrt 固件
          - ⚽ 固件源码: ${{ env.REPO_URL }}
          - 💝 固件源码和分支: ${{ env.REPO_BRANCH }}
          - ⏰ 编译时间：${{ env.FILE_TIME1 }}
          - 🎈 编译用时：${{ env.COMPILE_DURATION }}（小时:分钟:秒）
          - 🌐 默认地址: ${{ env.MANAGE_IP }}
          - 🌴 名称：root
          - 🔑 默认密码: password
          ### 🧊 固件版本
          - 固件编译前最后一次➦[主源码](${{ env.REPO_URL }})更新记录
          - ${{ env.VERSION_INFO }} 


      # ========== 修改：编译成功邮件添加固件列表 ==========
    - name: 编译成功邮件通知
      uses: dawidd6/action-send-mail@v3
      with:
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: FanchmWrt固件编译成功通知
          body: |
            您好，固件编译已成功完成！
            关键信息如下：
            1. 编译时间：${{ env.FILE_TIME1 }}
            2. 编译时长：${{ env.COMPILE_DURATION }}（小时:分钟:秒）
            3. 设备型号：${{ env.FULL_DEVICE_NAME }}
            4. 固件管理IP：${{ env.MANAGE_IP }}
            5. 工作流ID：${{ github.run_id }}
            6. 固件文件列表：${{ env.FIRMWARE_LIST }}
            7. Release链接：https://github.com/${{ github.repository }}/releases/tag/AutoUpdate
            8. 日志链接：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.RECEIVE_EMAIL }}
          from: GitHub Actions
          secure: true

    - name: 编译失败邮件通知
      if: failure() && steps.compile.conclusion == 'failure'
      uses: dawidd6/action-send-mail@v3
      with:
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: FanchmWrt固件编译失败通知
          body: |
            您好，FanchmWrt固件编译工作流运行失败！
            仓库地址：${{ github.repository }}
            工作流运行ID：${{ github.run_id }}
            日志链接：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.RECEIVE_EMAIL }}
          from: GitHub Actions
          secure: true

    - name: 删除旧的工作流运行记录
      continue-on-error: true
      if: env.DELETE_OLD_WORKFLOW == 'true' && !cancelled()
      uses: Mattraks/delete-workflow-runs@v2
      with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0

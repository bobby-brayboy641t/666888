###########################################################
#   Description: Compile OpenWrt by GitHub Actions        #
#   Based on: https://github.com/P3TERX/Actions-OpenWrt   #
#   Author: Hyy2001X                                      #
###########################################################

name: x86_64

on:
  repository_dispatch:
  ## Git Push ж—¶и§ҰеҸ‘зј–иҜ‘(дёҚиҰҒеҲ йҷӨжӯӨиЎҢжіЁйҮҠ)
  #push:
  #  branches: 
  #    - master
  
  ## е®ҡж—¶и§ҰеҸ‘зј–иҜ‘(дёҚиҰҒеҲ йҷӨжӯӨиЎҢжіЁйҮҠ)
  schedule:
   - cron: 0 8 * * 5
  
  ## йҮҚж–°зӮ№дә® Star ж—¶и§ҰеҸ‘зј–иҜ‘(дёҚиҰҒеҲ йҷӨжӯӨиЎҢжіЁйҮҠ)
  #watch:
  #  types: [started]
  
  ### з•ҢйқўжҺ§еҲ¶йғЁеҲҶ ( д»ҘдёӢеҶ…е®№иҜ·дҝқжҢҒдёҚеҸҳ, еҰӮжңүйңҖиҰҒд»…дҝ®ж”№ options йҖүйЎ№ )
  workflow_dispatch:
    inputs:
      Tempoary_CONFIG:
        description: 'й…ҚзҪ®ж–Үд»¶'
        default: 'x86_64'
        type: choice
        options:
          - 'x86_64'
      Code_SOURCE: 
        description: 'жәҗз Ғд»“'
        default: 'immortalwrt/immortalwrt:openwrt-24.10'
        type: choice
        options:
          - 'immortalwrt/immortalwrt:master'
          - 'immortalwrt/immortalwrt:openwrt-24.10'
          - 'coolsnowwolf/lede:master'
      Tempoary_FLAG:
        description: 'еӣәд»¶ж Үзӯҫ'
        default: 'AUTO'
        type: choice
        options:
          - 'AUTO'
          - 'Full'
      Tempoary_IP:
        description: 'еӣәд»¶ IP ең°еқҖ [еҸҜйҖү]'
        default: '192.168.9.253'
      UPLOAD_RELEASES:
        description: 'дёҠдј еӣәд»¶еҲ° Releases'
        default: 'true'
        type: boolean
      UPLOAD_ARTIFACTS:
        description: 'дёҠдј еӣәд»¶еҲ° Artifacts'
        default: 'false'
        type: boolean
      UPLOAD_BIN_ARTIFACTS:
        description: 'дёҠдј  bin ж–Үд»¶еӨ№еҲ° Artifacts'
        default: 'false'
        type: boolean
      SSH:
        description: 'SSHиҝһжҺҘActions'
        default: 'false'
        type: boolean
      ### з•ҢйқўжҺ§еҲ¶йғЁеҲҶз»“жқҹ ( д»ҘдёҠеҶ…е®№иҜ·дҝқжҢҒдёҚеҸҳ )

### иҜ·жҢүйңҖжұӮдҝ®ж”№д»ҘдёӢеҶ…е®№
### зҺҜеўғеҸҳйҮҸи®ҫзҪ®
env:
# зј–иҜ‘ж—¶и°ғз”Ёзҡ„ [.config] ж–Үд»¶еҗҚз§°
  CONFIG_FILE: x86_64
# жәҗз Ғд»“еә“:еҲҶж”Ҝ
  DEFAULT_SOURCE: ${{ github.event.inputs.Code_SOURCE }}
# еҲ йҷӨж— з”Ёж–Үд»¶д»ҘеўһеҠ зј–иҜ‘з©әй—ҙ
  DELETE_USELESS_FILES: true
# еҲ йҷӨж—©жңҹзҡ„ workflow д»»еҠЎ
  DELETE_OLD_WORKFLOW: true
# Cacheзј“еӯҳеҠ йҖҹзј–иҜ‘
  CACHE_ACCELERATE: true
### з»“жқҹ
### иҜ·жҢүйңҖжұӮдҝ®ж”№д»ҘдёҠеҶ…е®№

jobs:
  Compile:
    runs-on: ubuntu-22.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}

    steps:

    - name: жЈҖжҹҘжңҚеҠЎеҷЁжҖ§иғҪ
      run: |
        echo "иӯҰе‘Ҡвҡ "
        echo "еҲҶй…Қзҡ„жңҚеҠЎеҷЁжҖ§иғҪжңүйҷҗпјҢиӢҘйҖүжӢ©зҡ„жҸ’д»¶иҝҮеӨҡпјҢеҠЎеҝ…жіЁж„ҸCPUжҖ§иғҪпјҒ"
        echo -e "е·ІзҹҘCPUеһӢеҸ·пјҲйҷҚеәҸпјүпјҡ7763пјҢ8370CпјҢ8272CLпјҢ8171MпјҢE5-2673 \n"
        echo "--------------------------CPUдҝЎжҒҜ--------------------------"
        echo "CPUзү©зҗҶж•°йҮҸпјҡ$(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo -e "CPUж ёеҝғдҝЎжҒҜпјҡ$(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------еҶ…еӯҳдҝЎжҒҜ--------------------------"
        echo "е·Іе®үиЈ…еҶ…еӯҳиҜҰз»ҶдҝЎжҒҜпјҡ"
        echo -e "$(sudo lshw -short -C memory | grep GiB) \n"
        echo "--------------------------зЎ¬зӣҳдҝЎжҒҜ--------------------------"
        echo "зЎ¬зӣҳж•°йҮҸпјҡ$(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT
        cpu_nproc=$(nproc)
        if [[ "$cpu_nproc" =~ "4" ]]; then
          echo "CPUдёә4ж ёпјҢз»§з»ӯжү§иЎҢе‘Ҫд»Ө"
        else
          echo "CPUдёҚдёә4ж ёпјҢжҖ§иғҪдёҚи¶іпјҢеҒңжӯўжү§иЎҢе‘Ҫд»Ө"
          exit 1
        fi

    - name: еҲқе§ӢеҢ–зі»з»ҹзҺҜеўғ
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        docker image prune -f
        sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /etc/apt/sources.list.d /usr/local/lib/android
        sudo -E apt-mark hold grub-efi-amd64-signed
        sudo -E apt update
        sudo -E apt -y purge azure-cli* docker* ghc* zulu* llvm* firefox google* dotnet* powershell* openjdk* mysql* php* mongodb* dotnet* snap*
        sudo -E apt -y full-upgrade
        sudo -E apt -y install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool llvm lrzsz msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo tree uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev flex python-is-python3
        sudo -E systemctl daemon-reload
        sudo -E apt -y autoremove --purge
        sudo -E apt clean

    - name: дҪҝз”Ёactions/checkoutжқҘжЈҖеҮәд»Јз Ғ
      uses: actions/checkout@main

    - name: жӣҙж–°ж—¶еҢәгҖҒзј–иҜ‘ж—¶й—ҙ
      id: date
      run: |
          sudo timedatectl set-timezone "Asia/Shanghai"
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
          echo "FILE_TIME=$(date +"%m-%d %H.%M")" >> $GITHUB_ENV
          echo "FILE_TIME1=$(date "+%Yе№ҙ%mжңҲ%dж—Ҙ-%HзӮ№%MеҲҶ")" >> $GITHUB_ENV
          echo "FILE_TIME2=$(date "+%Y%m%d-%H%M")" >> $GITHUB_ENV
          COMPILE_TIME=$(date +"%Y-%m-%d %H:%M:%S")
          echo "COMPILE_TIME=$COMPILE_TIME" >> $GITHUB_ENV
          echo "вң… ејҖе§Ӣзј–иҜ‘ж—¶й—ҙпјҡ$COMPILE_TIME"
          START_TIME=`date +'%Y-%m-%d %H:%M:%S'`
          echo "START_SECONDS=$(date --date="$START_TIME" +%s)" >> $GITHUB_ENV
          COMPILE_START=$(date +%s)
          echo "COMPILE_START=$COMPILE_START" >> $GITHUB_ENV

    - name: UbuntuеҸҜз”ЁзЈҒзӣҳз©әй—ҙ
      if: env.DELETE_USELESS_FILES == 'true' && !cancelled()
      uses: jlumbroso/free-disk-space@main
      with:
        # this might remove tools that are actually needed,
        # if set to "true" but frees about 6 GB
        tool-cache: true
        # all of these default to true, but feel free to set to
        # "false" if necessary for your workflow
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        swap-storage: true

    - name: еҠ иҪҪиҮӘе®ҡд№үеҸҳйҮҸ
      run: |
        if [ -n "${{ github.event.inputs.Tempoary_CONFIG }}" ]
        then
            if [ -f "$GITHUB_WORKSPACE/Configs/${{ github.event.inputs.Tempoary_CONFIG }}" ]
            then
                CONFIG_FILE=${{ github.event.inputs.Tempoary_CONFIG }}
            else
                CONFIG_FILE=${{ env.CONFIG_FILE }}
            fi
        else
            CONFIG_FILE=${{ env.CONFIG_FILE }}
        fi
        if [ ! -f "$GITHUB_WORKSPACE/Configs/$CONFIG_FILE" ]
        then
            echo "CONFIG_FILE: [/Config/$CONFIG_FILE] is not detected ..."
            exit 1
        else
            echo "CONFIG_FILE: [/Config/$CONFIG_FILE]"
            echo "CONFIG_FILE=$CONFIG_FILE" >> $GITHUB_ENV
        fi
        if [ -n "${{ github.event.inputs.Tempoary_IP }}" ]
        then
            echo "IP: [${{ github.event.inputs.Tempoary_IP }}]"
            echo "Tempoary_IP=${{ github.event.inputs.Tempoary_IP }}" >> $GITHUB_ENV
        fi
        if [ -n "${{ github.event.inputs.Tempoary_FLAG }}" ]
        then
            echo "FLAG: [${{ github.event.inputs.Tempoary_FLAG }}]"
            echo "Tempoary_FLAG=${{ github.event.inputs.Tempoary_FLAG }}" >> $GITHUB_ENV
        fi
        REPO_URL="https://github.com/$(cut -d \: -f 1 <<< ${{ env.DEFAULT_SOURCE }})"
        REPO_BRANCH=$(cut -d \: -f 2 <<< ${{ env.DEFAULT_SOURCE }})
        echo "REPO_URL=$REPO_URL" >> $GITHUB_ENV
        echo "REPO_BRANCH=$REPO_BRANCH" >> $GITHUB_ENV
        echo "Compile_Date=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV
        echo "Display_Date=$(date +%Y/%m/%d)" >> $GITHUB_ENV
        if [[ -z "${{ github.event.inputs.Tempoary_CONFIG }}" ]]; then
            echo "TIMED_TRIGGER=true" >> $GITHUB_ENV
        else
            echo "UPLOAD_RELEASES=${{ github.event.inputs.UPLOAD_RELEASES }}" >> $GITHUB_ENV
            echo "UPLOAD_ARTIFACTS=${{ github.event.inputs.UPLOAD_ARTIFACTS }}" >> $GITHUB_ENV
            echo "UPLOAD_BIN_ARTIFACTS=${{ github.event.inputs.UPLOAD_BIN_ARTIFACTS }}" >> $GITHUB_ENV
        fi

    - name: е…ӢйҡҶOpenwrtжәҗд»Јз Ғ
      run: |
        git clone -b $REPO_BRANCH $REPO_URL openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        VERSION_INFO=$(git show -s --date=short --format="дҪңиҖ…: %an<br/>ж—¶й—ҙ: %cd<br/>еҶ…е®№: %s<br/>hash: %H")
        echo "VERSION_INFO=$VERSION_INFO" >> $GITHUB_ENV

    - name: иҝҗиЎҢDIYиҮӘе®ҡд№үи„ҡжң¬
      run: |
        echo "Free space:"
        df -h
        chmod +x Scripts/AutoBuild_*.sh
        [ -e files ] && mv files openwrt/files
        cd openwrt
        if [ "${{ env.CACHE_ACCELERATE }}" == true ]
        then
            echo -e "\nCONFIG_DEVEL=y\nCONFIG_CCACHE=y\n" >> $GITHUB_WORKSPACE/Configs/$CONFIG_FILE
        fi
        cp $GITHUB_WORKSPACE/Configs/$CONFIG_FILE .config
        source $GITHUB_WORKSPACE/Scripts/AutoBuild_DiyScript.sh
        source $GITHUB_WORKSPACE/Scripts/AutoBuild_Function.sh
        make defconfig
        Firmware_Diy_Start
        rm -f .config && cp $GITHUB_WORKSPACE/Configs/$CONFIG_FILE .config
        source $GITHUB_WORKSPACE/Scripts/AutoBuild_Diy.sh
        Firmware_Diy_Main
        Firmware_Diy
        Firmware_Diy_Other

        DEVICE=$(grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/')
        ARCH=$(grep '^CONFIG_TARGET_ARCH_PACKAGES=' .config | sed -r 's/.*="(.*)"/\1/')
        FULL_DEVICE_NAME="${DEVICE} ${ARCH}"
        [ -n "$DEVICE" ] && echo "DEVICE_NAME=_$DEVICE" >> $GITHUB_ENV
        echo "FULL_DEVICE_NAME=$FULL_DEVICE_NAME" >> $GITHUB_ENV
        echo "вң… жҸҗеҸ–еҲ°зҡ„пјҲи®ҫеӨҮеһӢеҸ·+жһ¶жһ„пјүпјҡ$FULL_DEVICE_NAME"

        MANAGE_IP=""
        CONFIG_GENERATE="package/base-files/files/bin/config_generate"
        if [ -f "$CONFIG_GENERATE" ]; then
          MANAGE_IP=$(grep -oP '192\.168\.\d+\.\d+' "$CONFIG_GENERATE" | head -1)
        fi
        if [ -z "$MANAGE_IP" ] && [ -f "files/etc/config/network" ]; then
          MANAGE_IP=$(grep -A 10 'config interface 'lan'' "files/etc/config/network" | grep 'option ipaddr' | sed -r 's/.*ipaddr[[:space:]]*"(.*)"/\1/' | head -1)
        fi
        MANAGE_IP=${MANAGE_IP:-"192.168.1.1"}
        echo "MANAGE_IP=$MANAGE_IP" >> $GITHUB_ENV
        echo "вң… жҸҗеҸ–еҲ°зҡ„з®ЎзҗҶIPпјҡ$MANAGE_IP"

        SOURCE_REPO="$(echo $REPO_URL | awk -F '/' '{print $(NF)}')"
        echo "SOURCE_REPO=$SOURCE_REPO" >> $GITHUB_ENV
        DEVICE_TARGET=$(cat .config | grep CONFIG_TARGET_BOARD | awk -F '"' '{print $2}')
        echo "DEVICE_TARGET=$DEVICE_TARGET" >> $GITHUB_ENV
        DEVICE_SUBTARGET=$(cat .config | grep CONFIG_TARGET_SUBTARGET | awk -F '"' '{print $2}')
        echo "DEVICE_SUBTARGET=$DEVICE_SUBTARGET" >> $GITHUB_ENV
        echo "вң… жҸҗеҸ–еҲ°зҡ„еҶ…е®№пјҡ$DEVICE_SUBTARGET
        echo "вң… жҸҗеҸ–еҲ°зҡ„еҶ…е®№пјҡ$DEVICE_TARGET

    - name: SSHиҝһжҺҘ
      uses: P3TERX/ssh2actions@v1.0.0
      if: github.event.inputs.SSH == 'true'
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}     

    - name: з”ҹжҲҗconfig
      run: |
        cd openwrt && make defconfig && ./scripts/diffconfig.sh > AAA.txt
        cat AAA.txt

    - name: й…ҚзҪ®ж–Үд»¶AAAдёҠдј Github Artifacts
      uses: actions/upload-artifact@main
      with:
        name: config
        path: openwrt/AAA.txt

    - name: зј“еӯҳеҠ йҖҹ
      if: env.CACHE_ACCELERATE == 'true'
      uses: HiGarfield/cachewrtbuild@main
      with:
        ccache: 'true'
        toolchain: 'true'
        mixkey: cache-${{ env.REPO_BRANCH }}-${{ env.FULL_DEVICE_NAME }}
        prefix: ${{ github.workspace }}/openwrt

    - name: йў„е…ҲдёӢиҪҪDLеә“
      run: |
        cd openwrt
        ./scripts/feeds install -a
        make defconfig
        make download -j8

    - name: ејҖе§Ӣжһ„е»әOpenWrtеӣәд»¶
      id: compile
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 || V=s
        [ "$?" == 0 ] && echo "Compile_Result=true" >> $GITHUB_ENV || echo "Compile_Result=false" >> $GITHUB_ENV

    - name: и®Ўз®—зј–иҜ‘ж—¶й•ҝ
      id: calc_duration
      run: |
          COMPILE_END=$(date +%s)
          DURATION_SEC=$((COMPILE_END - COMPILE_START))
          HOURS=$((DURATION_SEC / 3600))
          MINUTES=$(((DURATION_SEC % 3600) / 60))
          SECONDS=$((DURATION_SEC % 60))
          COMPILE_DURATION=$(printf "%02d:%02d:%02d" $HOURS $MINUTES $SECONDS)
          echo "COMPILE_DURATION=$COMPILE_DURATION" >> $GITHUB_ENV
          echo "вң… зј–иҜ‘жҖ»иҖ—ж—¶пјҡ$COMPILE_DURATIONпјҲH:M:Sпјү"

    - name: з©әй—ҙдҪҝз”Ё
      continue-on-error: true
      run: du -h ./ --max-depth=1 && tree -a -L 2

    - name: ж•ҙзҗҶеӣәд»¶дҝЎжҒҜ
      if: steps.compile.outcome == 'success' && !cancelled()
      run: |
        cd openwrt
        source $GITHUB_WORKSPACE/Scripts/AutoBuild_Function.sh
        Firmware_Diy_End

    - name: е°Ҷеӣәд»¶дёҠдј иҮіRelease
      uses: svenstaro/upload-release-action@v2
      if: env.UPLOAD_RELEASES == 'true' && steps.compile.outcome == 'success' && !cancelled()
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: openwrt/bin/Firmware/*
        file_glob: true
        tag: AutoUpdate
        overwrite: true

    - name: Refresh API (1/2)
      if: env.UPLOAD_RELEASES == 'true' && steps.compile.outcome == 'success' && !cancelled()
      run: |
        wget https://api.github.com/repos/${{github.repository}}/releases/tags/AutoUpdate -O API
        
    - name: Refresh API (2/2)
      if: env.UPLOAD_RELEASES == 'true' && steps.compile.outcome == 'success' && !cancelled()
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ./API
        file_glob: true
        tag: AutoUpdate
        overwrite: true
        body: |
          ### рҹ“’ еӣәд»¶дҝЎжҒҜ
          - рҹ’» иҝҷжҳҜ ${{ env.FULL_DEVICE_NAME }} е№іеҸ°дҪҝз”Ёзҡ„ OpenWrt еӣәд»¶
          - вҡҪ еӣәд»¶жәҗз Ғ: ${{ env.REPO_URL }}
          - рҹ’қ еӣәд»¶жәҗз Ғе’ҢеҲҶж”Ҝ: ${{ env.REPO_BRANCH }}
          - вҸ° зј–иҜ‘ж—¶й—ҙпјҡ${{ env.FILE_TIME1 }}
          - рҹҺҲ зј–иҜ‘з”Ёж—¶пјҡ${{ env.COMPILE_DURATION }}пјҲе°Ҹж—¶:еҲҶй’ҹ:з§’пјү
          - рҹҢҗ й»ҳи®Өең°еқҖ: ${{ env.MANAGE_IP }}
          - рҹҢҙ еҗҚз§°пјҡroot
          - рҹ”‘ й»ҳи®ӨеҜҶз Ғ: password
          ### рҹ§Ҡ еӣәд»¶зүҲжң¬
          - еӣәд»¶зј–иҜ‘еүҚжңҖеҗҺдёҖж¬ЎвһҰ[дё»жәҗз Ғ](${{ env.REPO_URL }})жӣҙж–°и®°еҪ•
          - ${{ env.VERSION_INFO }} 

      # ========== дҝ®ж”№пјҡзј–иҜ‘жҲҗеҠҹйӮ®д»¶ж·»еҠ еӣәд»¶еҲ—иЎЁ ==========
    - name: зј–иҜ‘жҲҗеҠҹйӮ®д»¶йҖҡзҹҘ
      uses: dawidd6/action-send-mail@v3
      with:
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: FanchmWrtеӣәд»¶зј–иҜ‘жҲҗеҠҹйҖҡзҹҘ
          body: |
            жӮЁеҘҪпјҢеӣәд»¶зј–иҜ‘е·ІжҲҗеҠҹе®ҢжҲҗпјҒ
            е…ій”®дҝЎжҒҜеҰӮдёӢпјҡ
            1. зј–иҜ‘ж—¶й—ҙпјҡ${{ env.FILE_TIME1 }}
            2. зј–иҜ‘ж—¶й•ҝпјҡ${{ env.COMPILE_DURATION }}пјҲе°Ҹж—¶:еҲҶй’ҹ:з§’пјү
            3. и®ҫеӨҮеһӢеҸ·пјҡ${{ env.FULL_DEVICE_NAME }}
            4. еӣәд»¶з®ЎзҗҶIPпјҡ${{ env.MANAGE_IP }}
            5. е·ҘдҪңжөҒIDпјҡ${{ github.run_id }}
            6. еӣәд»¶ж–Үд»¶еҲ—иЎЁпјҡ${{ env.FIRMWARE_LIST }}
            7. Releaseй“ҫжҺҘпјҡhttps://github.com/${{ github.repository }}/releases/tag/AutoUpdate
            8. ж—Ҙеҝ—й“ҫжҺҘпјҡhttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.RECEIVE_EMAIL }}
          from: GitHub Actions
          secure: true

    - name: зј–иҜ‘еӨұиҙҘйӮ®д»¶йҖҡзҹҘ
      if: failure() && steps.compile.conclusion == 'failure'
      uses: dawidd6/action-send-mail@v3
      with:
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: FanchmWrtеӣәд»¶зј–иҜ‘еӨұиҙҘйҖҡзҹҘ
          body: |
            жӮЁеҘҪпјҢFanchmWrtеӣәд»¶зј–иҜ‘е·ҘдҪңжөҒиҝҗиЎҢеӨұиҙҘпјҒ
            д»“еә“ең°еқҖпјҡ${{ github.repository }}
